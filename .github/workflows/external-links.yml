name: External Links

on:
  pull_request:

concurrency:
  group: external-links-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Check External Links
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run external link checker
        id: external-links
        shell: bash
        run: |
          mkdir -p external-links
          set +e
          pnpm --dir apps/docs exec tsx ./scripts/lint-external-links.ts --json > external-links/report.json 2> external-links/output.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Parse and print external links report
        if: ${{ always() }}
        shell: bash
        run: |
          REPORT_FILE="external-links/formatted.md"
          JSON_FILE="external-links/report.json"
          OUTPUT_FILE="external-links/output.txt"
          {
            echo "## External Link Check Report"
            echo ""
          } > "$REPORT_FILE"
          if [ ! -s "$JSON_FILE" ]; then
            echo "::warning::No JSON output found at $JSON_FILE. Using empty object."
            echo "{}" > "$JSON_FILE"
          fi

          if ! jq . "$JSON_FILE" >/dev/null; then
            echo "::error::Invalid JSON in $JSON_FILE"
            {
              echo "### ❌ Invalid JSON report output"
              echo ""
              echo "The external link checker output was not valid JSON."
              echo ""
              echo "<details>"
              echo "<summary>Raw report.json</summary>"
              echo ""
              echo '```text'
              cat "$JSON_FILE"
              echo '```'
              echo "</details>"
            } >> "$REPORT_FILE"
            if [ -s "$OUTPUT_FILE" ]; then
              echo "stderr output:"
              cat "$OUTPUT_FILE"
              {
                echo ""
                echo "<details>"
                echo "<summary>stderr output</summary>"
                echo ""
                echo '```text'
                cat "$OUTPUT_FILE"
                echo '```'
                echo "</details>"
              } >> "$REPORT_FILE"
            fi
            cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "External links JSON report:"
          jq . "$JSON_FILE"
          echo ""

          echo "External links summary:"
          jq -r '
            "- Scanned files: \(.scannedFiles // "n/a")",
            "- Extracted external links: \(.extractedExternalLinks // "n/a")",
            "- Unique links checked: \(.uniqueLinksChecked // "n/a")",
            "- Failed links: \(.failedLinks // "n/a")"
          ' "$JSON_FILE"
          echo ""

          FAILED_COUNT="$(jq -r '.failedLinks // 0' "$JSON_FILE")"
          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "Failures:"
            jq -r '
              .failures[]? as $failure
              | "- \($failure.url) (\($failure.reason))",
                ($failure.occurrences[]? | "  - \(.file):\(.line)")
            ' "$JSON_FILE"
          else
            echo "No failed external links found."
          fi

          {
            jq -r '
              "- Scanned files: `\(.scannedFiles // "n/a")`",
              "- Extracted external links: `\(.extractedExternalLinks // "n/a")`",
              "- Unique links checked: `\(.uniqueLinksChecked // "n/a")`",
              "- Failed links: `\(.failedLinks // "n/a")`"
            ' "$JSON_FILE"
            echo ""

            if [ "$FAILED_COUNT" -gt 0 ]; then
              echo "### Failures"
              echo ""
              jq -r '
                .failures[]? as $failure
                | "- \($failure.url) (`\($failure.reason)`)",
                  ($failure.occurrences[]? | "  - `\(.file):\(.line)`")
              ' "$JSON_FILE"
            else
              echo "### ✅ No failed external links found."
            fi

            if [ -s "$OUTPUT_FILE" ]; then
              echo ""
              echo "<details>"
              echo "<summary>stderr output</summary>"
              echo ""
              echo '```text'
              cat "$OUTPUT_FILE"
              echo '```'
              echo "</details>"
            fi
          } > "$REPORT_FILE"

          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment external links report
        if: ${{ always() && github.event.pull_request.head.repo.fork == false && hashFiles('external-links/formatted.md') != '' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: external-links
          path: external-links/formatted.md

      - name: Fail if broken links found
        if: ${{ steps.external-links.outputs.exit_code != '0' }}
        run: |
          echo "External link checker failed."
          exit 1
